<!DOCTYPE html>
<html lang="mk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Покана за Матура</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --warm-white: #faf8f5;
      --taupe: #c9b89a;
      --gold: #b8975a;
      --dark: #2a2118;
      --muted: #8a7a68;
    }

    body {
      background: var(--warm-white);
      color: var(--dark);
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 15% 85%, rgba(201,184,154,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 15%, rgba(184,151,90,0.12) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 60px 32px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .cap-wrap {
      margin-bottom: 12px;
      animation: floatUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .cap-img {
      width: 140px;
      height: auto;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.12));
    }

    .title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2.8rem, 8vw, 4.2rem);
      font-weight: 700;
      color: var(--dark);
      letter-spacing: -0.5px;
      text-align: center;
      line-height: 1.1;
      animation: floatUp 1.2s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .title-line {
      display: block;
      width: 200px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 10px auto 40px;
      animation: fadeIn 1s 0.5s both;
    }

    .info-block {
      width: 100%;
      display: flex;
      flex-direction: column;
      animation: floatUp 1s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .info-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 28px 0;
      border-bottom: 1px solid rgba(184,151,90,0.25);
    }

    .info-row:last-child { border-bottom: none; }

    .info-icon {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid var(--taupe);
      border-radius: 50%;
    }

    .info-icon svg {
      width: 18px;
      height: 18px;
      stroke: var(--gold);
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .info-text label {
      display: block;
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .info-text p {
      font-size: 1.45rem;
      font-weight: 400;
      color: var(--dark);
      line-height: 1.3;
    }

    .info-text p strong { font-weight: 600; }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      margin: 44px 0 36px;
      animation: fadeIn 1s 0.6s both;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--taupe));
    }

    .divider-line:last-child {
      background: linear-gradient(90deg, var(--taupe), transparent);
    }

    .divider-diamond {
      width: 8px;
      height: 8px;
      background: var(--gold);
      transform: rotate(45deg);
    }

    .map-section {
      width: 100%;
      animation: floatUp 1s 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .map-label {
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-bottom: 16px;
    }

    .map-frame {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 32px rgba(42,33,24,0.12), 0 1px 4px rgba(42,33,24,0.08);
      border: 1px solid rgba(201,184,154,0.4);
      aspect-ratio: 4/3;
      max-height: 360px;
    }

    .map-frame iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .map-caption {
      text-align: center;
      margin-top: 12px;
      font-size: 1rem;
      color: var(--muted);
      font-style: italic;
    }

    .footer-note {
      margin-top: 52px;
      font-family: 'Dancing Script', cursive;
      font-size: 1.5rem;
      color: var(--taupe);
      animation: fadeIn 1.2s 0.8s both;
    }

    @keyframes floatUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @media (max-width: 480px) {
      .page { padding: 40px 20px 60px; }
      .info-text p { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="cap-wrap">
    <svg class="cap-img" viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="130" cy="110" rx="38" ry="16" fill="#f0e8d5" stroke="#c9b89a" stroke-width="1.5"/>
      <rect x="95" y="88" width="70" height="36" rx="5" fill="#f5edd8" stroke="#c9b89a" stroke-width="1.5"/>
      <ellipse cx="95" cy="106" rx="8" ry="16" fill="#ecdfc4" stroke="#c9b89a" stroke-width="1.2"/>
      <ellipse cx="165" cy="106" rx="8" ry="16" fill="#ecdfc4" stroke="#c9b89a" stroke-width="1.2"/>
      <path d="M125 106 Q130 100 135 106 Q130 112 125 106Z" fill="#b8975a"/>
      <path d="M130 100 Q125 94 122 98" stroke="#b8975a" stroke-width="2" fill="none"/>
      <path d="M130 100 Q135 94 138 98" stroke="#b8975a" stroke-width="2" fill="none"/>
      <polygon points="100,52 165,75 100,98 35,75" fill="#2a2118"/>
      <polygon points="100,45 165,68 100,91 35,68" fill="#1a1410"/>
      <polygon points="100,45 165,68 100,91 35,68" fill="#2a2118" opacity="0.9"/>
      <polygon points="100,46 162,68 100,90 38,68" fill="none" stroke="#4a3828" stroke-width="1"/>
      <circle cx="100" cy="46" r="4" fill="#b8975a"/>
      <line x1="100" y1="46" x2="136" y2="75" stroke="#b8975a" stroke-width="1.8"/>
      <line x1="136" y1="75" x2="136" y2="105" stroke="#b8975a" stroke-width="1.8"/>
      <rect x="131" y="105" width="10" height="18" rx="1" fill="#b8975a" opacity="0.6"/>
      <line x1="133" y1="105" x2="130" y2="123" stroke="#b8975a" stroke-width="1.2"/>
      <line x1="136" y1="105" x2="136" y2="124" stroke="#b8975a" stroke-width="1.2"/>
      <line x1="139" y1="105" x2="141" y2="123" stroke="#b8975a" stroke-width="1.2"/>
    </svg>
  </div>

  <h1 class="title">Покана за Матура</h1>
  <span class="title-line"></span>

  <div class="info-block">
    <div class="info-row">
      <div class="info-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <div class="info-text">
        <label>Датум</label>
        <p><strong>16.05.2026</strong></p>
      </div>
    </div>

    <div class="info-row">
      <div class="info-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
      </div>
      <div class="info-text">
        <label>Време</label>
        <p>со почеток од <strong>20:00ч</strong></p>
      </div>
    </div>

    <div class="info-row">
      <div class="info-icon">
        <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div class="info-text">
        <label>Место</label>
        <p>Хотел <strong>„Еми"</strong> – Струмица</p>
      </div>
    </div>
  </div>

  <div class="divider">
    <span class="divider-line"></span>
    <span class="divider-diamond"></span>
    <span class="divider-line"></span>
  </div>

  <div class="map-section">
    <p class="map-label">Локација</p>
    <div class="map-frame">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2990.2878155906933!2d22.641041279345707!3d41.45467250000001!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14a9fe481e2c9753%3A0x2f5dad54a8a9e160!2sHotel%20Emi!5e0!3m2!1sen!2smk!4v1772559148541!5m2!1sen!2smk"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>
    <p class="map-caption">Хотел „Еми", Струмица</p>
  </div>

  <p class="footer-note">Ве очекуваме!</p>

</div>
</body>
</html>
